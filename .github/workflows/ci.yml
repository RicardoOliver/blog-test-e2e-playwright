name: 🧪 Blog Agi JS – Pipeline de Testes

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags Cucumber (ex: @smoke, @regressao)'
        required: false
        default: 'not @Ignorar'
      browser:
        description: 'Browser'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  HEADLESS: 'true'

jobs:

  # ── 1. Instalar e validar ───────────────────────────────────────────────────
  instalar-validar:
    name: 📦 Instalar e Validar
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🌐 Instalar browsers do Playwright
        run: npx playwright install ${{ github.event.inputs.browser || 'chromium' }} --with-deps

      - name: 🔍 Validar features (dry-run)
        run: |
          npx cucumber-js \
            --config cucumber.cjs \
            --dry-run \
            --tags '${{ github.event.inputs.tags || 'not @Ignorar' }}'
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}

  # ── 2. Smoke Tests ────────────────────────────────────────────────────────
  smoke-tests:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: instalar-validar
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: 🌐 Instalar browsers
        run: npx playwright install ${{ github.event.inputs.browser || 'chromium' }} --with-deps

      - name: 💨 Executar Smoke Tests
        run: npm run test:smoke
        env:
          HEADLESS: 'true'
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}

      - name: 📤 Upload evidências – Smoke
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidencias-smoke-${{ github.run_number }}
          path: |
            relatorios/allure-results/
            relatorios/screenshots/
            relatorios/cucumber-report.json
            relatorios/cucumber-report.html
          retention-days: 7

  # ── 3. Regressão por funcionalidade (matrix) ───────────────────────────────
  regressao:
    name: 🔄 Regressão – ${{ matrix.funcionalidade.nome }}
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 40
    if: github.event_name != 'pull_request' || github.base_ref == 'main'

    strategy:
      fail-fast: false
      matrix:
        funcionalidade:
          - nome: "Pesquisa de Artigos"
            tags: "@pesquisa and not @Ignorar"
          - nome: "Navegação por Categorias"
            tags: "@navegacao and not @Ignorar"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: 🌐 Instalar browsers
        run: npx playwright install ${{ github.event.inputs.browser || 'chromium' }} --with-deps

      - name: 🧪 Executar – ${{ matrix.funcionalidade.nome }}
        run: |
          npx cucumber-js \
            --config cucumber.cjs \
            --tags '${{ matrix.funcionalidade.tags }}'
        env:
          HEADLESS: 'true'
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}

      - name: 📤 Upload resultados – ${{ matrix.funcionalidade.nome }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultados-${{ matrix.funcionalidade.nome }}-${{ github.run_number }}
          path: |
            relatorios/allure-results/
            relatorios/screenshots/
            relatorios/cucumber-report.json
          retention-days: 14

  # ── 4. Quality Gate ────────────────────────────────────────────────────────
  quality-gate:
    name: 🚦 Quality Gate
    runs-on: ubuntu-latest
    needs: [smoke-tests, regressao]
    if: always()
    timeout-minutes: 5

    steps:
      - name: 🚦 Avaliar Quality Gate
        id: gate
        run: |
          echo "================================================"
          echo "     🚦 QUALITY GATE – BLOG DO AGI JS          "
          echo "================================================"

          SMOKE="${{ needs.smoke-tests.result }}"
          REGR="${{ needs.regressao.result }}"
          GATE=true

          echo "📋 Status dos Jobs:"
          echo "   💨 Smoke Tests : $SMOKE"
          echo "   🔄 Regressão   : $REGR"
          echo ""

          if [ "$SMOKE" != "success" ]; then
            echo "❌ REGRA 1 VIOLADA: Smoke Tests falharam! Deploy bloqueado."
            GATE=false
          else
            echo "✅ REGRA 1: Smoke Tests aprovados"
          fi

          if [ "$REGR" == "failure" ]; then
            echo "⚠️  REGRA 2: Regressão com falhas – verifique o relatório"
          elif [ "$REGR" == "skipped" ]; then
            echo "ℹ️  REGRA 2: Regressão pulada (PR para branch não-main)"
          else
            echo "✅ REGRA 2: Regressão aprovada"
          fi

          echo ""
          if [ "$GATE" == "true" ]; then
            echo "✅ QUALITY GATE: APROVADO – build apto para deploy"
          else
            echo "❌ QUALITY GATE: REPROVADO – deploy bloqueado!"
          fi
          echo "================================================"

          echo "gate=$GATE"         >> $GITHUB_OUTPUT
          echo "smoke=$SMOKE"       >> $GITHUB_OUTPUT
          echo "regressao=$REGR"    >> $GITHUB_OUTPUT

          [ "$GATE" == "true" ] || exit 1

      - name: 💬 Comentar resultado no PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const gate   = '${{ steps.gate.outputs.gate }}'      === 'true';
            const smoke  = '${{ steps.gate.outputs.smoke }}';
            const regr   = '${{ steps.gate.outputs.regressao }}';
            const smOk   = smoke === 'success' ? '✅ Passou' : '❌ Falhou';
            const rgOk   = regr  === 'success' ? '✅ Passou'
                         : regr  === 'skipped' ? '⏭️ Pulado' : '⚠️ Com falhas';

            const body = [
              `## ${gate ? '✅' : '❌'} Quality Gate: ${gate ? 'APROVADO' : 'REPROVADO'}`,
              '',
              '| Job | Status |',
              '|-----|--------|',
              `| 💨 Smoke Tests | ${smOk} |`,
              `| 🔄 Regressão   | ${rgOk} |`,
              '',
              gate ? '🚀 Código aprovado para merge!'
                   : '🚫 Corrija as falhas antes do merge.',
              '',
              `📊 [Ver pipeline](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });

  # ── 5. Relatório Allure ────────────────────────────────────────────────────
  relatorio-allure:
    name: 📊 Relatório Allure
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always() && needs.smoke-tests.result != 'cancelled'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download de todos os resultados
        uses: actions/download-artifact@v4
        with:
          path: todos-resultados/
          merge-multiple: true

      - name: 📊 Gerar Relatório Allure
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: todos-resultados/relatorios/allure-results
          allure_report:  allure-report
          keep_reports:   20
      
      - name: 🧩 Preparar artefatos do Pages
        if: always()
        run: |
          mkdir -p allure-report
          touch allure-report/.nojekyll

      - name: 🚀 Publicar no GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:   ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir:    ./allure-report
          destination_dir: allure-report
          force_orphan: true

      - name: 📤 Upload do Relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-allure-${{ github.run_number }}
          path: allure-report/
          retention-days: 30
